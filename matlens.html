            const disabled=p.requiresKey&&!session.openaiKey;
            return(
              <button key={p.id} onClick={()=>!disabled&&ai.setProvider(p.id)} disabled={disabled}
                className={`flex items-center gap-2 px-3 py-2 rounded border transition-all text-[12px] text-left font-ui ${ai.provider===p.id?'border-accent bg-accent-dim text-accent':'border-[var(--border-default)] bg-raised text-text-md hover:bg-hover disabled:opacity-40 disabled:cursor-not-allowed'}`}>
                <div className={`w-3 h-3 rounded-full border-2 flex-shrink-0 ${ai.provider===p.id?'border-accent bg-accent':'border-text-lo'}`}/>
                <span className="font-semibold flex-1">{p.label}</span>
                {p.free&&<Badge variant="green" className="text-[10px]">無料</Badge>}
                {p.requiresKey&&<Badge variant="gray" className="text-[10px]">要キー</Badge>}
              </button>
            );
          })}
        </div>
      </FormGroup>
      {session.tier==='public'&&(
        <FormGroup label="招待コード（30回/日に増量）" className="mb-3">
          <div className="flex gap-1.5">
            <Input value={invite} onChange={e=>setInvite(e.target.value)} placeholder="MATLENS2026" className="flex-1 text-[12px]"/>
            <Button variant="primary" size="sm" onClick={()=>{const ok=applyInvite(invite);if(ok){addToast('招待コード適用 (30回/日)');setInvite('');}else addToast('無効なコードです','warn');}} disabled={!invite}>適用</Button>
          </div>
          <p className="text-[11px] text-text-lo mt-1">デモコード: MATLENS2026</p>
        </FormGroup>
      )}
      <div className="flex flex-col gap-2">
        <FormGroup label="OpenAI APIキー（無制限 + mini解放）">
          <div className="flex gap-1.5"><Input value={openaiKey} onChange={e=>setOpenaiKey(e.target.value)} placeholder="sk-..." type="password" className="flex-1 text-[12px]"/><Button variant="default" size="sm" onClick={()=>{setApiKey('openai',openaiKey);addToast(openaiKey?'OpenAI キー設定':'キー削除');}}>保存</Button></div>
        </FormGroup>
        <FormGroup label="Gemini APIキー（無制限）">
          <div className="flex gap-1.5"><Input value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} placeholder="AIza..." type="password" className="flex-1 text-[12px]"/><Button variant="default" size="sm" onClick={()=>{setApiKey('gemini',geminiKey);addToast(geminiKey?'Gemini キー設定':'キー削除');}}>保存</Button></div>
        </FormGroup>
      </div>
    </div>
  );
};

/* useClaude — 後方互換ラッパー (App で useAI を使うため dummy) */
function useClaude() {
  const call = useCallback(async () => '（後方互換）App コンテキストから useAI を使用してください。', []);
  return { call };
}

/* =====================================================
   === SECTION 9: ROOT APP ===
===================================================== */
function App() {
  const [db, dispatch] = useReducer(dbReducer, INITIAL_DB);
  const [page, setPage] = useState('dash');
  const [detailId, setDetailId] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [voicePanelVisible, setVoicePanelVisible] = useState(false);

  const { theme, setTheme } = useTheme();
  const embedding = useEmbedding(db);
  const rateLimit = useRateLimit();
  const ai = useAI(rateLimit);
  const claude = ai; // 後方互換 - claude.call = ai.call
  const [settingsVisible, setSettingsVisible] = useState(false);

  // Mock API install
  useEffect(() => { installMockAPI(() => db, dispatch); }, []);

  // Voice command routing
  const handleVoiceCommand = useCallback((text) => {
    const t = text;
    if (/ハンズフリー(開始|オン)/i.test(t)) { voice.enableHandsfree?.(); return; }
    if (/ハンズフリー(停止|オフ)/i.test(t)) { voice.disableHandsfree?.(); return; }
    if (/読み上げ(停止|止)/i.test(t)) { voice.stopSpeaking(); return; }
    if (/ダッシュボード/i.test(t)) { setPage('dash'); voice.speak('ダッシュボードを表示します'); return; }
    if (/(一覧|リスト)/i.test(t)) { setPage('list'); voice.speak('材料データ一覧を表示します'); return; }
    if (/登録(画面|フォーム)/i.test(t)) { setPage('new'); voice.speak('登録フォームを開きます'); return; }
    const sm = t.match(/^(検索|さがして)\s*(.+)/i);
    if (sm) { setPage('vsearch'); voice.speak(`「${sm[2]}」で検索します`); return; }
    // default → RAG (handled in VoicePage / RAGChatPage via context)
  }, []);

  const voice = useVoice(handleVoiceCommand);

  const addToast = useCallback((msg, type = 'ok') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);

  const navTo = (p) => {
    if (p.startsWith('edit_')) { setDetailId(p.slice(5)); setPage('edit'); return; }
    setPage(p); if (p !== 'detail') setDetailId(null);
  };
  const showDetail = (id) => { setDetailId(id); setPage('detail'); };

  const renderPage = () => {
    const commonProps = { db, dispatch, onNav: navTo, claude, embedding, voice };
    switch(page) {
      case 'dash':    return <DashboardPage {...commonProps} />;
      case 'list':    return <MaterialListPage {...commonProps} onDetail={showDetail} search={embedding.search} />;
      case 'new':     return <MaterialFormPage {...commonProps} editId={null} onCancel={() => setPage('list')} onSuccess={() => setPage('list')} />;
      case 'edit':    return <MaterialFormPage {...commonProps} editId={detailId} onCancel={() => setPage(detailId ? 'detail' : 'list')} onSuccess={() => { if(detailId) setPage('detail'); else setPage('list'); }} />;
      case 'detail':  return <DetailPage {...commonProps} recordId={detailId} onBack={() => setPage('list')} onEdit={() => navTo('edit_'+detailId)} />;
      case 'vsearch': return <VectorSearchPage {...commonProps} />;
      case 'rag':     return <RAGChatPage {...commonProps} />;
      case 'sim':     return <SimilarPage {...commonProps} />;
      case 'voice':   return <VoicePage voice={voice} />;
      case 'api':     return <ApiDebugPage db={db} dispatch={dispatch} />;
      case 'tests':   return <TestSuitePage />;
      case 'uxdesign':return <UxDesignPage />;
      case 'help':    return <HelpPage />;
      case 'settings': return <MasterSettingsPage db={db} />;
      case 'about':   return <AboutPage />;
      default:        return <DashboardPage {...commonProps} />;
    }
  };

  return (
    <AppCtx.Provider value={{ db, dispatch, addToast, toasts, theme }}>
      <a href="#main" className="skip-nav">コンテンツへスキップ</a>
      <div className="flex flex-col h-screen overflow-hidden" style={{ background: 'var(--bg-base)' }}>
        <Topbar
          theme={theme} setTheme={setTheme}
          onToggleSidebar={() => setSidebarCollapsed(c=>!c)}
          onToggleVoice={() => setVoicePanelVisible(v=>!v)}
          embStatus={embedding.status} embCount={embedding.embCount}
        />
        <div className="flex flex-1 overflow-hidden">
          <Sidebar
            currentPage={page} onNav={navTo}
            collapsed={sidebarCollapsed}
            onToggle={() => setSidebarCollapsed(c => !c)}
            dbCount={db.length}
            embStatus={embedding.status} embCount={embedding.embCount}
          />
          <main id="main" className="flex-1 overflow-y-auto p-6" role="main" aria-label="メインコンテンツ">
            {renderPage()}
          </main>
        </div>
      </div>
      <VoicePanel visible={voicePanelVisible} voice={voice} onClose={() => setVoicePanelVisible(false)} />
      <SettingsPanel rateLimit={rateLimit} ai={ai} visible={settingsVisible} onClose={() => setSettingsVisible(false)} />
      {/* AI設定フローティングボタン */}
      <button onClick={() => setSettingsVisible(v => !v)}
        className="fixed bottom-6 right-6 z-[2000] flex items-center gap-1.5 px-3 py-2 rounded-full bg-surface border border-[var(--border-default)] text-[12px] font-semibold font-ui shadow-md hover:bg-hover transition-all"
        title="AI設定 / 利用制限">
        <Icon name="ai" size={13} className="text-ai" />
        <span className="text-text-md">{ai.providerDef.label}</span>
        <span className={`ml-1 font-mono text-[11px] ${rateLimit.remaining < 5 ? "text-err" : rateLimit.session.tier === "own-key" ? "text-ok" : "text-text-lo"}`}>
          {rateLimit.session.tier === "own-key" ? "∞" : rateLimit.remaining + "回"}
        </span>
      </button>
      <ToastHub />
    </AppCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
