/* =====================================================
   BASE RESET & GLOBAL
===================================================== */
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:var(--font-ui);
  background:var(--bg-base);
  color:var(--text-hi);
  line-height:1.6;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
:focus-visible{outline:2px solid var(--border-focus);outline-offset:2px;border-radius:var(--radius-sm)}
:focus:not(:focus-visible){outline:none}
.skip-nav{position:absolute;top:-60px;left:8px;z-index:9999;background:var(--accent);color:#fff;padding:8px 16px;border-radius:0 0 var(--radius-md) var(--radius-md);font-size:14px;font-weight:600;text-decoration:none;transition:top .15s}
.skip-nav:focus{top:0}

/* Markdown preview */
.md-preview h1{font-size:16px;font-weight:700;margin:10px 0 6px;color:var(--text-hi)}
.md-preview h2{font-size:14px;font-weight:700;margin:8px 0 4px;color:var(--text-hi)}
.md-preview h3{font-size:13px;font-weight:700;margin:6px 0 3px;color:var(--text-md)}
.md-preview p{margin:0 0 7px;font-size:13px}
.md-preview p:last-child{margin:0}
.md-preview strong{font-weight:700;color:var(--text-hi)}
.md-preview em{font-style:italic;color:var(--text-md)}
.md-preview ul,.md-preview ol{margin:5px 0 5px 16px;font-size:13px}
.md-preview li{margin:2px 0}
.md-preview code{font-family:var(--font-mono);font-size:12px;background:var(--bg-raised);padding:1px 5px;border-radius:3px;border:1px solid var(--border-faint);color:var(--accent)}
.md-preview pre{background:var(--bg-sunken);padding:10px 12px;border-radius:var(--radius-md);overflow-x:auto;margin:7px 0;border:1px solid var(--border-faint)}
.md-preview pre code{background:none;border:none;padding:0;color:var(--text-hi)}
.md-preview blockquote{border-left:3px solid var(--accent);padding:5px 10px;margin:7px 0;background:var(--bg-raised);border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--text-md);font-size:13px}
.md-preview table{width:100%;border-collapse:collapse;margin:7px 0;font-size:12px}
.md-preview th{padding:5px 9px;background:var(--bg-raised);border:1px solid var(--border-faint);font-weight:700;text-align:left}
.md-preview td{padding:5px 9px;border:1px solid var(--border-faint)}
.md-preview tr:nth-child(even) td{background:var(--bg-raised)}
.md-preview hr{border:none;border-top:1px solid var(--border-faint);margin:9px 0}

/* sidebar transition */
.sidebar-nav{width:216px;transition:width .22s cubic-bezier(.4,0,.2,1)}
.sidebar-nav.collapsed{width:48px}

/* chart canvas */
.chart-container{position:relative;height:160px;width:100%}

/* voice wave animation */
@keyframes wav{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,80,80,.4)}50%{box-shadow:0 0 0 8px rgba(224,80,80,0)}}
@keyframes speak-wave{from{box-shadow:0 0 0 2px var(--vec-dim)}to{box-shadow:0 0 0 8px transparent}}

/* eng/cae glow effects */
[data-theme="eng"] .glow-accent,[data-theme="cae"] .glow-accent{box-shadow:0 0 12px var(--accent-glow)}
[data-theme="eng"] .ptitle,[data-theme="cae"] .ptitle{text-shadow:0 0 16px var(--accent-glow)}

/* scan animation for AI cards */
@keyframes scan{0%{left:-100%}60%{left:120%}100%{left:120%}}
/* ── Tooltip (Portal方式) ── body直下にposition:fixedでレンダリング */
.tt-portal{
  pointer-events:none;
  position:fixed;
  z-index:99999;
  white-space:nowrap;
  font-family:var(--font-ui);
  font-size:11px;
  font-weight:600;
  line-height:1.2;
  padding:5px 9px;
  border-radius:4px;
  background:rgba(15,20,30,.92);
  color:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
  opacity:0;
  transform:translateY(3px);
  transition:opacity .12s ease, transform .12s ease;
  max-width:280px;
  word-break:keep-all;
}
.tt-portal.tt-visible{
  opacity:1;
  transform:translateY(0);
}
.tt-portal::before{
  content:'';
  position:absolute;
  border:4px solid transparent;
}
.tt-portal.tt-bottom::before{
  bottom:100%;left:var(--tt-arrow,50%);transform:translateX(-50%);
  border-bottom-color:rgba(15,20,30,.92);
}
.tt-portal.tt-top::before{
  top:100%;left:var(--tt-arrow,50%);transform:translateX(-50%);
  border-top-color:rgba(15,20,30,.92);
}
.tt-portal.tt-right::before{
  right:100%;top:50%;transform:translateY(-50%);
  border-right-color:rgba(15,20,30,.92);
}

const AppCtx = createContext(null);

const DB_ACTIONS = {
  ADD: 'ADD', UPDATE: 'UPDATE', DELETE: 'DELETE',
  BULK_DELETE: 'BULK_DELETE', BULK_APPROVE: 'BULK_APPROVE',
  IMPORT: 'IMPORT',
};

function dbReducer(state, action) {
  switch(action.type) {
    case DB_ACTIONS.ADD:    return [action.record, ...state];
    case DB_ACTIONS.UPDATE: return state.map(r => r.id === action.record.id ? {...r,...action.record} : r);
    case DB_ACTIONS.DELETE: return state.filter(r => r.id !== action.id);
    case DB_ACTIONS.BULK_DELETE: return state.filter(r => !action.ids.has(r.id));
    case DB_ACTIONS.BULK_APPROVE: return state.map(r => action.ids.has(r.id) ? {...r,status:'承認済'} : r);
    case DB_ACTIONS.IMPORT: return [...action.records, ...state];
    default: return state;
  }
}

/** useEmbedding — TF.js USE ベクトル検索 */
function useEmbedding(db) {
  const [model, setModel] = useState(null);
  const [embeddings, setEmbeddings] = useState({});
  const [status, setStatus] = useState('idle'); // idle | loading | indexing | ready | fallback
  const modelRef = useRef(null);

  useEffect(() => {
    let cancelled = false;
    setStatus('loading');
    (async () => {
      try {
        const m = await use.load();
        if (cancelled) return;
        modelRef.current = m;
        setModel(m);
        setStatus('indexing');
        await buildIndex(m, db, cancelled, setEmbeddings);
        if (!cancelled) setStatus('ready');
      } catch (e) {
        if (!cancelled) setStatus('fallback');
      }
    })();
    return () => { cancelled = true; };
  }, []);

  async function buildIndex(m, records, cancelled, setter) {
    const texts = records.map(r =>
      `${r.name} ${r.cat} ${r.comp} 硬度${r.hv}HV 引張${r.ts}MPa ${r.memo}`.trim()
    );
    const emb = await m.embed(texts);
    const arr = await emb.array();
    emb.dispose();
    if (cancelled) return;
    const map = {};
    records.forEach((r, i) => { map[r.id] = arr[i]; });
    setter(map);
  }

  const cosineSim = (a, b) => {
    let dot = 0, na = 0, nb = 0;
    for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
    return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-10);
  };

  const search = useCallback(async (query, topK = 5) => {
    if (!modelRef.current) {
      // fallback keyword search
      const q = query.toLowerCase();
      return db
        .map(r => ({ ...r, score: [...q.split(' ')].filter(w => w.length > 1 && `${r.name} ${r.comp} ${r.memo}`.toLowerCase().includes(w)).length / q.split(' ').length * 0.8 + Math.random() * 0.05 }))
        .sort((a,b) => b.score - a.score).slice(0, topK);
    }
    const t = await modelRef.current.embed([query]);
    const arr = await t.array(); t.dispose();
    const qVec = arr[0];
    return db
      .map(r => ({ ...r, score: embeddings[r.id] ? cosineSim(qVec, embeddings[r.id]) : 0 }))
      .sort((a,b) => b.score - a.score).slice(0, topK);
  }, [db, embeddings]);

  const addToIndex = useCallback(async (record) => {
    if (!modelRef.current) return;
    const text = `${record.name} ${record.cat} ${record.comp} 硬度${record.hv}HV 引張${record.ts}MPa ${record.memo}`.trim();
    const emb = await modelRef.current.embed([text]);
    const arr = await emb.array(); emb.dispose();
    setEmbeddings(prev => ({ ...prev, [record.id]: arr[0] }));
  }, []);

  return { status, embeddings, search, addToIndex, embCount: Object.keys(embeddings).length };
}

/* =====================================================
   === SECTION 11: MOCK REST API (fetch interceptor)
===================================================== */
/** @type {ApiLog[]} */
let _apiLogs = [];
const _apiLogListeners = [];
const notifyLog = (log) => { _apiLogs = [log, ..._apiLogs].slice(0, 200); _apiLogListeners.forEach(fn => fn(log)); };
const onApiLog  = (fn) => { _apiLogListeners.push(fn); return () => { const i=_apiLogListeners.indexOf(fn); if(i>=0)_apiLogListeners.splice(i,1); }; };
const getApiLogs = () => _apiLogs;
const MOCK_CONFIG = { baseLatency: 120, jitter: 80, errorRate: 0 };
const mockDelay = () => new Promise(r => setTimeout(r, MOCK_CONFIG.baseLatency + Math.random() * MOCK_CONFIG.jitter));

function installMockAPI(getDb, dispatch) {
  const originalFetch = window.fetch.bind(window);
  window.fetch = async (input, init = {}) => {
    const url = typeof input === 'string' ? input : input.url;
    if (!url.startsWith('/api/')) return originalFetch(input, init);
    const start = Date.now();
    const method = (init.method || 'GET').toUpperCase();
    const path = url.replace(/\?.*$/, '');
    const query = url.includes('?') ? Object.fromEntries(new URLSearchParams(url.split('?')[1])) : {};
    let reqBody = null;
    try { if (init.body) reqBody = JSON.parse(init.body); } catch(e) {}
    if (Math.random() < MOCK_CONFIG.errorRate / 100) {
      await mockDelay();
      const logE = { id: Math.random().toString(36).slice(2), ts: start, method, path, status: 500, latency: Date.now()-start, reqBody, resBody: { error: 'Internal Server Error (simulated)' }, error: 'Simulated 500' };
      notifyLog(logE);
      return new Response(JSON.stringify(logE.resBody), { status: 500, headers: { 'Content-Type': 'application/json' } });
    }
    await mockDelay();
    let status = 200, resBody = null;
    const db = getDb();
    if (method === 'GET' && path === '/api/materials') {
      let rows = [...db];
      if (query.cat)    rows = rows.filter(r => r.cat === query.cat);
      if (query.status) rows = rows.filter(r => r.status === query.status);
      if (query.q)      rows = rows.filter(r => `${r.name} ${r.id} ${r.comp}`.toLowerCase().includes(query.q.toLowerCase()));
      if (query.hv_min) rows = rows.filter(r => r.hv >= parseFloat(query.hv_min));
      if (query.hv_max) rows = rows.filter(r => r.hv <= parseFloat(query.hv_max));
      const page = parseInt(query.page || '1'), limit = parseInt(query.limit || '10');
      resBody = { data: rows.slice((page-1)*limit, page*limit), meta: { total: rows.length, page, limit, pages: Math.ceil(rows.length/limit) } };
    } else if (method === 'GET' && path.match(/^\/api\/materials\/MAT-\d+$/)) {
      const id = path.split('/').pop(), r = db.find(x => x.id === id);
      if (r) { resBody = r; } else { status = 404; resBody = { error: `Material ${id} not found` }; }
    } else if (method === 'POST' && path === '/api/materials') {
      if (!reqBody || !reqBody.name || !reqBody.cat) { status = 422; resBody = { error: 'Validation failed', fields: { name: !reqBody?.name ? 'Required' : null, cat: !reqBody?.cat ? 'Required' : null } }; }
      else { const record = { ...reqBody, id: `MAT-0${nextId++}`, date: new Date().toISOString().slice(0,10), status: '登録済', ai: false }; dispatch({ type: 'ADD', record }); status = 201; resBody = record; }
    } else if (method === 'PUT' && path.match(/^\/api\/materials\/MAT-\d+$/)) {
      const id = path.split('/').pop(), r = db.find(x => x.id === id);
      if (!r) { status = 404; resBody = { error: `Material ${id} not found` }; }
      else { const updated = { ...r, ...reqBody, id }; dispatch({ type: 'UPDATE', record: updated }); resBody = updated; }
    } else if (method === 'PATCH' && path.match(/^\/api\/materials\/MAT-\d+\/status$/)) {
      const id = path.split('/')[3], r = db.find(x => x.id === id);
      if (!r) { status = 404; resBody = { error: `Material ${id} not found` }; }
      else { dispatch({ type: 'UPDATE', record: { ...r, status: reqBody.status } }); resBody = { id, status: reqBody.status }; }
    } else if (method === 'DELETE' && path.match(/^\/api\/materials\/MAT-\d+$/)) {
      const id = path.split('/').pop(), r = db.find(x => x.id === id);
      if (!r) { status = 404; resBody = { error: `Material ${id} not found` }; }
      else { dispatch({ type: 'DELETE', id }); status = 204; resBody = null; }
    } else if (method === 'GET' && path === '/api/stats') {
      resBody = { total: db.length, byStatus: Object.fromEntries(['登録済','レビュー待','承認済','要修正'].map(s=>[s,db.filter(r=>r.status===s).length])), byCategory: Object.fromEntries(['金属合金','セラミクス','ポリマー','複合材料'].map(c=>[c,db.filter(r=>r.cat===c).length])), aiDetected: db.filter(r=>r.ai).length };
    } else if (method === 'GET' && path.match(/^\/api\/materials\/MAT-\d+\/similar$/)) {
      const id = path.split('/')[3], base = db.find(r => r.id === id);
      resBody = { data: base ? db.filter(r=>r.cat===base.cat&&r.id!==id).slice(0,5).map(r=>({...r,score:0.7+Math.random()*.25})) : [] };
    } else { status = 404; resBody = { error: `Route ${method} ${path} not found` }; }
    const latency = Date.now() - start;
    const log = { id: Math.random().toString(36).slice(2), ts: start, method, path, status, latency, reqBody, resBody };
    notifyLog(log);
    return new Response(resBody !== null ? JSON.stringify(resBody) : '', { status, headers: { 'Content-Type': 'application/json', 'X-Mock-API': 'true', 'X-Response-Time': `${latency}ms` } });
  };
}

===================================================== */
/** @type {Provider[]} */
const PROVIDERS = [
  { id: 'openai-nano',  label: 'GPT-4.1 nano',    model: 'gpt-4.1-nano',     requiresKey: false, free: true },
  { id: 'gemini-flash', label: 'Gemini 2.5 Flash', model: 'gemini-2.5-flash', requiresKey: false, free: true },
  { id: 'openai-mini',  label: 'GPT-4.1 mini',     model: 'gpt-4.1-mini',     requiresKey: true,  free: false },
];

const VALID_INVITE_CODES = new Set(['MATLENS2026', 'MATLENS-DEMO', 'RESEARCH2026']);
const RATE_LIMITS = { 'own-key': Infinity, invited: 30, public: 20 };
const RL_STORAGE_KEY = 'matlens_rl_v1';
const SESSION_KEY    = 'matlens_session_v1';

function loadRL() { try { return JSON.parse(localStorage.getItem(RL_STORAGE_KEY) || 'null'); } catch(e) { return null; } }
function saveRL(state) { try { localStorage.setItem(RL_STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function loadSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); } catch(e) { return null; } }
function saveSession(session) { try { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); } catch(e) {} }

function useRateLimit() {
  const today = () => new Date().toISOString().slice(0, 10);
  const initState = () => {
    const sess = loadSession() || { tier: 'public', inviteCode: null, openaiKey: null, geminiKey: null };
    let rl = loadRL();
    if (!rl || rl.date !== today()) { rl = { date: today(), count: 0, tier: sess.tier, limit: RATE_LIMITS[sess.tier] }; saveRL(rl); }
    return { session: sess, rl };
  };
  const [state, setState] = useState(initState);
  const { session, rl } = state;
  const canCall = rl.count < (rl.limit === Infinity ? Infinity : rl.limit);
  const remaining = rl.limit === Infinity ? 999 : Math.max(0, rl.limit - rl.count);

  const consume = useCallback(() => {
    if (session.tier === 'own-key') return true;
    const current = loadRL() || rl;
    if (current.count >= current.limit) return false;
    const next = { ...current, count: current.count + 1 };
    saveRL(next); setState(s => ({ ...s, rl: next })); return true;
  }, [session, rl]);

  const applyInvite = useCallback((code) => {
    const valid = VALID_INVITE_CODES.has(code.trim().toUpperCase());
    if (!valid) return false;
    const newSess = { ...session, tier: 'invited', inviteCode: code };
    saveSession(newSess);
    const newRl = { date: today(), count: 0, tier: 'invited', limit: RATE_LIMITS.invited };
    saveRL(newRl); setState({ session: newSess, rl: newRl }); return true;
  }, [session]);

  const setApiKey = useCallback((provider, key) => {
    const field = provider === 'openai' ? 'openaiKey' : 'geminiKey';
    const newSess = { ...session, [field]: key || null, tier: key ? 'own-key' : (session.inviteCode ? 'invited' : 'public') };
    saveSession(newSess);
    const newRl = { date: today(), count: loadRL()?.count || 0, tier: newSess.tier, limit: RATE_LIMITS[newSess.tier] };
    saveRL(newRl); setState({ session: newSess, rl: newRl });
  }, [session]);

  return { session, rl, canCall, remaining, consume, applyInvite, setApiKey };
}

function useAI(rateLimit) {
  const [provider, setProvider] = useState('openai-nano');
  const providerDef = PROVIDERS.find(p => p.id === provider) || PROVIDERS[0];

  const call = useCallback(async (prompt, system) => {
    const sys = system || 'あなたは材料科学の専門家AIアシスタントです。Matlens に組み込まれています。Markdown形式で簡潔・実用的な日本語で回答してください。';
    if (!rateLimit.canCall) {
      const { limit } = rateLimit.rl;
      return `**利用上限に達しました**\n\n本日の利用回数上限（${limit === Infinity ? '無制限' : limit + '回/日'}）に達しました。\n\n**解決方法:**\n- 招待コードをお持ちの方: 右下の設定から入力してください（30回/日）\n- 自前のAPIキーを設定してください（無制限）\n- 明日リセットされます`;
    }
    rateLimit.consume();
    const { session } = rateLimit;
    const hasOwnOpenai = !!session.openaiKey;
    const hasOwnGemini = !!session.geminiKey;
    const effectiveProvider = hasOwnOpenai ? 'openai-mini' : (hasOwnGemini ? 'gemini-flash' : provider);
    const pDef = PROVIDERS.find(p => p.id === effectiveProvider) || providerDef;
    try {
      if (pDef.id === 'gemini-flash') {
        const apiKey = session.geminiKey || 'DEMO';
        if (apiKey === 'DEMO') return `（Gemini 2.5 Flash デモモード）\n\nAPIキーを設定後に実際の回答が有効になります。\n\n**プロンプト:** ${prompt.slice(0, 80)}...`;
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${pDef.model}:generateContent?key=${apiKey}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: `${sys}\n\n${prompt}` }] }], generationConfig: { maxOutputTokens: 1000 } })
        });
        const d = await res.json();
        if (d.error) return `Gemini エラー: ${d.error.message}`;
        return d.candidates?.[0]?.content?.parts?.[0]?.text || 'Gemini 応答エラー';
      } else {
        const apiKey = session.openaiKey || 'DEMO';
        if (apiKey === 'DEMO') return `（${pDef.label} デモモード）\n\nAPIキーを設定後にリアルタイム応答が有効になります。\n\n**プロンプト:** ${prompt.slice(0, 80)}...`;
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({ model: pDef.model, max_tokens: 1000, messages: [{ role: 'system', content: sys }, { role: 'user', content: prompt }] })
        });
        const d = await res.json();
        if (d.error) return `OpenAI エラー: ${d.error.message}`;
        return d.choices?.[0]?.message?.content || '応答を取得できませんでした。';
      }
    } catch (e) { return `API接続エラー: ${e.message}`; }
  }, [provider, rateLimit]);

  return { call, provider, setProvider, providerDef, providers: PROVIDERS };
}


/* =====================================================
   === SECTION 4.5: TOOLTIP ATOM — Portal方式
   問題: overflow:hidden/auto の親要素に position:absolute は
         クリップされる。ReactDOM.createPortal で body直下に
         レンダリングし、getBoundingClientRect()で位置計算する。
   - 500ms遅延表示（連続発火防止）
   - placement: 'bottom'(default) | 'top' | 'right'
   - label が falsy の場合は children をそのまま返す
===================================================== */
const Tooltip = ({ label, placement = 'bottom', children, className = '' }) => {
  const triggerRef = useRef(null);
  const timerRef   = useRef(null);
  const [pos, setPos]       = useState(null); // { top, left, arrowLeft }
  const [visible, setVisible] = useState(false);
  const DELAY = 500;
  const GAP   = 8;  // トリガーとツールチップの隙間px
  const MARGIN = 10; // viewport端のマージンpx

  const calcPos = useCallback(() => {
    const el = triggerRef.current;
    if (!el) return;
    const r   = el.getBoundingClientRect();
    const vw  = window.innerWidth;
    const vh  = window.innerHeight;

    // ツールチップ幅は最大280px(CSS)、仮想的に180pxで計算
    const TW = 180;
    const TH = 28;

    let top, left, arrowLeft = '50%', placementUsed = placement;

    if (placement === 'bottom') {
      top  = r.bottom + GAP;
      left = r.left + r.width / 2 - TW / 2;
    } else if (placement === 'top') {
      top  = r.top - TH - GAP;
      left = r.left + r.width / 2 - TW / 2;
    } else { // right
      top  = r.top + r.height / 2 - TH / 2;
      left = r.right + GAP;
      arrowLeft = '50%';
    }

    // viewport右端補正
    if (placement !== 'right' && left + TW > vw - MARGIN) {
      const overflow = (left + TW) - (vw - MARGIN);
      arrowLeft = Math.max(12, TW/2 - overflow) + 'px';
      left = Math.max(MARGIN, vw - MARGIN - TW);
    }
    // viewport左端補正
    if (left < MARGIN) {
      arrowLeft = Math.max(12, r.left + r.width/2 - MARGIN) + 'px';
      left = MARGIN;
    }
    // viewport下端補正（bottomが収まらない場合はtopに切り替え）
    if (placement === 'bottom' && top + TH > vh - MARGIN) {
      top = r.top - TH - GAP;
      placementUsed = 'top';
    }

    setPos({ top, left, arrowLeft, placement: placementUsed });
  }, [placement]);

  const show = useCallback(() => {
    timerRef.current = setTimeout(() => {
      calcPos();
      setVisible(true);
    }, DELAY);
  }, [calcPos]);

  const hide = useCallback(() => {
    clearTimeout(timerRef.current);
    setVisible(false);
    setPos(null);
  }, []);

  // ラベルなし or 空文字はそのままchildren
  if (!label) return <span ref={triggerRef} className={className}>{children}</span>;

  const portal = pos && createPortal(
    <div
      role="tooltip"
      className={`tt-portal tt-${pos.placement}${visible ? ' tt-visible' : ''}`}
      style={{
        top:  pos.top,
        left: pos.left,
        '--tt-arrow': pos.arrowLeft,
      }}
    >
      {label}
    </div>,
    document.body
  );

  return (
    <>
      <span
        ref={triggerRef}
        className={`tt-wrap ${className}`}
        onMouseEnter={show}
        onMouseLeave={hide}
        onFocus={show}
        onBlur={hide}
      >
        {children}
      </span>
      {portal}
    </>
  );
};

/** Modal molecule */
const Modal = ({ open, onClose, title, children, footer, width = 'max-w-lg' }) => {
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    if (open) document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div
      className="fixed inset-0 z-[1000] flex items-center justify-center bg-black/50 animate-fade-in"
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
    >
      <div className={`bg-surface border border-[var(--border-strong)] rounded-xl p-6 ${width} w-full mx-4 max-h-[85vh] overflow-y-auto`} style={{ boxShadow: 'var(--shadow-lg)', transform: 'translateY(0)', animation: 'modalIn .2s ease' }}>

        <div className="text-[13px] text-text-md leading-relaxed mb-5">{children}</div>

      <style>{`

/** MarkdownBubble molecule — AI回答のレンダリング+アクションバー */
const MarkdownBubble = ({ text, onSpeak }) => {
  const [copied, setCopied] = useState(false);
  const html = useMemo(() => {
    if (typeof marked === 'undefined') return text.replace(/\n/g, '<br>');
    try {
      marked.setOptions({ breaks: true, gfm: true });
      return marked.parse(text);
    } catch(e) { return text; }
  }, [text]);

  const handleCopy = async () => {
    await navigator.clipboard.writeText(text);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  const handleDownload = () => {
    const a = document.createElement('a');

/** ExportModal molecule */
const ExportModal = ({ open, onClose, db, filtered }) => {
  const exportCSV = () => {
    const h = ['ID','名称','カテゴリ','硬度HV','引張MPa','弾性GPa','組成','バッチ','登録日','ステータス','備考'];
    const rows = filtered.map(r => [r.id,`"${r.name}"`,r.cat,r.hv,r.ts,r.el,`"${r.comp}"`,r.batch,r.date,r.status,`"${r.memo||''}"`]);
    const csv = [h,...rows].map(r => r.join(',')).join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download = `matdb_${new Date().toISOString().slice(0,10)}.csv`; a.click(); onClose();
  };
  const exportJSON = () => {
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify({exported:new Date().toISOString(),count:db.length,data:db},null,2));
    a.download = `matdb_${new Date().toISOString().slice(0,10)}.json`; a.click(); onClose();
  };
  const exportPDF = () => {
    const rows = db.map(r => `<tr><td>${r.id}</td><td>${r.name}</td><td>${r.cat}</td><td>${r.hv}</td><td>${r.ts}</td><td>${r.status}</td></tr>`).join('');
    const win = window.open('','_blank');
    win.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>Matlens レポート</title><style>body{font-family:sans-serif;font-size:11px;padding:20px}h1{font-size:16px;margin-bottom:4px}.meta{color:#666;font-size:11px;margin-bottom:16px}table{width:100%;border-collapse:collapse}th{background:#1e3050;color:#fff;padding:6px 8px;text-align:left;font-size:10px}td{padding:5px 8px;border-bottom:1px solid #e0e0e0;font-size:10px}tr:nth-child(even) td{background:#f7f7f5}</style></head><body><h1>Matlens 材料データレポート</h1><div class="meta">出力: ${new Date().toLocaleString('ja-JP')} ／ 総件数: ${db.length}件</div><table><thead><tr><th>ID</th><th>名称</th><th>カテゴリ</th><th>硬度HV</th><th>引張MPa</th><th>ステータス</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
    win.document.close(); setTimeout(() => win.print(), 400); onClose();
  };
  const items = [
    { icon: 'csv', label: 'CSV', desc: 'Excel で開けるCSV形式', action: exportCSV },
    { icon: 'json', label: 'JSON', desc: 'システム連携用JSON', action: exportJSON },
    { icon: 'pdf', label: 'PDF レポート', desc: '印刷用フルレポート', action: exportPDF },
    { icon: 'report', label: '全件 JSON', desc: 'DBフル出力', action: () => { exportJSON(); onClose(); } },
  ];
  return (
    <Modal open={open} onClose={onClose} title="データエクスポート" footer={<Button variant="default" onClick={onClose}>閉じる</Button>}>
      <div className="grid grid-cols-2 gap-2.5">
        {items.map(item => (
          <button key={item.label} onClick={item.action}
            className="flex flex-col items-center gap-2 p-4 bg-raised border border-[var(--border-default)] rounded-md cursor-pointer hover:border-accent hover:bg-accent-dim transition-all duration-150 text-center font-ui">
            <Icon name={item.icon} size={22} className="text-accent" />
            <div>
              <div className="text-[13px] font-bold text-text-hi">{item.label}</div>
              <div className="text-[12px] text-text-lo mt-0.5">{item.desc}</div>
            </div>
          </button>
        ))}
      </div>
    </Modal>
  );
};

/** VoicePanel organism */
const VoicePanel = ({ visible, voice, onClose }) => {

  const barCount = 20;

  // 波形アニメーション用タイムスタンプ
  const [tick, setTick] = useState(0);
  useEffect(() => {
    if (voiceState === 'idle') return;
    const id = setInterval(() => setTick(t => t + 1), 80);
    return () => clearInterval(id);
  }, [voiceState]);

  const handleClose = () => {
    clearTranscript?.();
    onClose?.();
  };

  if (!visible) return null;
  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[3000] flex items-center gap-3 px-4 py-3 bg-surface border border-[var(--border-default)] rounded-xl min-w-[460px] max-w-[92vw]" style={{ boxShadow: 'var(--shadow-lg)', animation: 'slideUp .25s ease' }}>

      {/* Mic button */}
      <Tooltip label={voiceState === 'listening' ? '音声認識を停止' : 'マイクをONにして話す'} placement="top">

        onClick={toggleListening}
        disabled={!isSRAvailable}
        aria-label={voiceState === 'listening' ? '音声認識を停止' : '音声認識を開始'}
        className={`w-10 h-10 rounded-full flex items-center justify-center border-[1.5px] flex-shrink-0 transition-all duration-200 disabled:opacity-40
          ${voiceState === 'listening' ? 'bg-err border-err text-white' : voiceState === 'speaking' ? 'bg-vec border-vec text-white' : 'bg-raised border-[var(--border-default)] text-text-md hover:bg-hover'}`}
        style={voiceState === 'listening' ? { animation: 'mic-pulse 1s ease-in-out infinite' } : voiceState === 'speaking' ? { animation: 'speak-wave .8s ease-in-out infinite alternate' } : {}}
      >
        <Icon name={voiceState === 'speaking' ? 'speaker' : voiceState === 'listening' ? 'stop' : 'mic'} size={16} />
      </button>
      </Tooltip>

      {/* Waveform */}
      <div className="flex items-center gap-0.5 h-7 flex-1 min-w-0 overflow-hidden" aria-hidden="true">
        {Array.from({ length: barCount }, (_, i) => (
          <div key={i} className="w-0.5 rounded-sm flex-shrink-0 transition-all duration-75"

        ))}

      </button>
      </Tooltip>
    </div>
  );

        type:'scatter',
        data:{datasets:['金属合金','セラミクス','ポリマー','複合材料'].map(cat=>({label:cat,data:db.filter(r=>r.cat===cat&&r.hv&&r.ts).map(r=>({x:r.hv,y:r.ts})),backgroundColor:(catColors[cat]||a)+'99',pointRadius:5,pointHoverRadius:7}))},

      });
    }
    return () => { Object.values(chartInstances.current).forEach(c => c.destroy()); chartInstances.current={}; };
  }, [db]);

          <Button variant="ai" size="sm" onClick={() => onNav('rag')}><Icon name="spark" size={13} />AI 分析</Button>

/** MaterialListPage */
const MaterialListPage = ({ db, dispatch, onNav, onDetail, search }) => {
  const [q, setQ] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [filterSt, setFilterSt] = useState('');
  const [filterBatch, setFilterBatch] = useState('');
  const [hvMin, setHvMin] = useState('');
  const [hvMax, setHvMax] = useState('');
  const [aiOnly, setAiOnly] = useState(false);
  const [sortKey, setSortKey] = useState('id-desc');
  const [page, setPage] = useState(1);
  const [pageSize, setPageSize] = useState(10);
  const [selected, setSelected] = useState(new Set());
  const [advOpen, setAdvOpen] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [exportOpen, setExportOpen] = useState(false);
  const { addToast } = useContext(AppCtx);

  const filtered = useMemo(() => {
    let rows = db.filter(r => {
      if(q && !`${r.id} ${r.name} ${r.comp} ${r.memo} ${r.author}`.toLowerCase().includes(q.toLowerCase())) return false;
      if(filterCat && r.cat !== filterCat) return false;
      if(filterSt && r.status !== filterSt) return false;
      if(filterBatch && r.batch !== filterBatch) return false;
      if(hvMin && r.hv < parseFloat(hvMin)) return false;
      if(hvMax && r.hv > parseFloat(hvMax)) return false;
      if(aiOnly && !r.ai) return false;
      return true;
    });
    rows.sort((a,b) => {
      switch(sortKey) {
        case 'id-asc':  return a.id.localeCompare(b.id);
        case 'hv-desc': return b.hv - a.hv;
        case 'hv-asc':  return a.hv - b.hv;
        case 'dt-desc': return b.date.localeCompare(a.date);
        case 'dt-asc':  return a.date.localeCompare(b.date);
        case 'nm-asc':  return a.name.localeCompare(b.name);
        default:        return b.id.localeCompare(a.id);
      }
    });
    return rows;
  }, [db, q, filterCat, filterSt, filterBatch, hvMin, hvMax, aiOnly, sortKey]);

  useEffect(() => { setPage(1); }, [q, filterCat, filterSt, filterBatch, hvMin, hvMax, aiOnly]);

  const totalPages = Math.ceil(filtered.length / pageSize);
  const slice = filtered.slice((page-1)*pageSize, page*pageSize);

  const toggleSelect = (id) => setSelected(prev => { const s=new Set(prev); s.has(id)?s.delete(id):s.add(id); return s; });
  const toggleAll = (checked) => setSelected(checked ? new Set(slice.map(r=>r.id)) : new Set());

  const activeTags = [
    q && { label:`"${q}"`, clear:()=>setQ('') },
    filterCat && { label:filterCat, clear:()=>setFilterCat('') },
    filterSt && { label:filterSt, clear:()=>setFilterSt('') },
    filterBatch && { label:`B:${filterBatch}`, clear:()=>setFilterBatch('') },
    (hvMin||hvMax) && { label:`HV:${hvMin||'*'}〜${hvMax||'*'}`, clear:()=>{setHvMin('');setHvMax('');} },
    aiOnly && { label:'AI検出のみ', clear:()=>setAiOnly(false) },
  ].filter(Boolean);

  return (
    <div className="flex flex-col gap-4">
      <ExportModal open={exportOpen} onClose={() => setExportOpen(false)} db={db} filtered={filtered} />
      <Modal open={!!deleteTarget} onClose={() => setDeleteTarget(null)} title="削除の確認" footer={
        <>
          <Button variant="default" onClick={() => setDeleteTarget(null)}>キャンセル</Button>
          <Button variant="danger" onClick={() => { dispatch({type:'DELETE',id:deleteTarget}); setDeleteTarget(null); addToast('削除しました'); }}>削除する</Button>
        </>
      }>
        <p>このデータを削除します。この操作は元に戻せません。</p>
      </Modal>

      <div className="flex items-start gap-3">
        <div className="flex-1">
          <h1 className="ptitle text-[19px] font-bold tracking-tight">材料データ一覧</h1>
          <p className="text-[12px] text-text-lo mt-0.5">{filtered.length}件 (DB: {db.length}件)</p>
        </div>
        <div className="flex gap-2">
          <Button variant="default" size="sm" onClick={() => setExportOpen(true)}><Icon name="download" size={13} />エクスポート</Button>
          <Button variant="primary" size="sm" onClick={() => onNav('new')}><Icon name="plus" size={13} />登録</Button>
        </div>
      </div>

      {/* Filters */}
      <Card className="p-3">
        <div className="flex gap-2 flex-wrap items-center">
          <SearchBox value={q} onChange={setQ} placeholder="名称・ID・組成・備考で全文検索..." className="min-w-48 flex-1" />
          <Select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="min-w-[120px]">
            <option value="">全カテゴリ</option>
            {['金属合金','セラミクス','ポリマー','複合材料'].map(c=><option key={c}>{c}</option>)}
          </Select>
          <Select value={filterSt} onChange={e=>setFilterSt(e.target.value)} className="min-w-[120px]">
            <option value="">全ステータス</option>
            {['登録済','レビュー待','承認済','要修正'].map(s=><option key={s}>{s}</option>)}
          </Select>
          <Select value={filterBatch} onChange={e=>setFilterBatch(e.target.value)}>
            <option value="">全バッチ</option>
            {['B-038','B-037','B-036','B-035'].map(b=><option key={b}>{b}</option>)}
          </Select>
          <Button variant="ghost" size="sm" onClick={() => setAdvOpen(v=>!v)}>
            <Icon name="filter" size={12} />{advOpen?'詳細を閉じる':'詳細条件'}
          </Button>
          {activeTags.length > 0 && <Button variant="ghost" size="sm" onClick={() => { setQ('');setFilterCat('');setFilterSt('');setFilterBatch('');setHvMin('');setHvMax('');setAiOnly(false); }}><Icon name="close" size={11} />クリア</Button>}
        </div>
        {advOpen && (
          <div className="flex gap-3 flex-wrap items-center mt-2.5 pt-2.5 border-t border-[var(--border-faint)]">
            <div className="flex items-center gap-1.5 text-[12px] text-text-md">
              <span>硬度 HV</span>
              <input type="number" value={hvMin} onChange={e=>setHvMin(e.target.value)} placeholder="最小" className="w-16 px-2 py-1 border border-[var(--border-default)] rounded text-[12px] bg-raised text-text-hi outline-none focus:border-[var(--accent-mid)]" />
              <span>〜</span>
              <input type="number" value={hvMax} onChange={e=>setHvMax(e.target.value)} placeholder="最大" className="w-16 px-2 py-1 border border-[var(--border-default)] rounded text-[12px] bg-raised text-text-hi outline-none focus:border-[var(--accent-mid)]" />
            </div>
            <label className="flex items-center gap-1.5 text-[12px] text-text-md cursor-pointer">
              <Checkbox checked={aiOnly} onChange={e=>setAiOnly(e.target.checked)} />AI検出のみ
            </label>
          </div>
        )}
        {activeTags.length > 0 && (
          <div className="flex gap-1.5 flex-wrap mt-2 pt-2 border-t border-[var(--border-faint)]">
            {activeTags.map((tag,i) => <FilterChip key={i} label={tag.label} onRemove={tag.clear} />)}
          </div>
        )}
      </Card>

      {/* Table */}
      <Card className="overflow-hidden">
        {/* Toolbar */}
        <div className="flex items-center gap-2 px-4 py-2.5 bg-raised border-b border-[var(--border-faint)]">
          <span className="text-[12px] font-semibold text-text-md">{filtered.length === db.length ? '全件表示' : `フィルタ: ${filtered.length}件`}</span>
          {selected.size > 0 && (
            <div className="flex items-center gap-2 ml-2">
              <span className="text-[12px] text-text-md">{selected.size}件選択中</span>
              <Button variant="default" size="xs" onClick={() => { dispatch({type:'BULK_APPROVE',ids:selected}); setSelected(new Set()); addToast('一括承認しました'); }}>
                <Icon name="check" size={11} />承認
              </Button>
              <Button variant="danger" size="xs" onClick={() => { dispatch({type:'BULK_DELETE',ids:selected}); setSelected(new Set()); addToast('削除しました'); }}>
                <Icon name="trash" size={11} />削除
              </Button>
            </div>
          )}
          <div className="ml-auto flex items-center gap-2">
            <Select value={sortKey} onChange={e=>setSortKey(e.target.value)} className="text-[12px] py-1">
              {[['id-desc','ID降順'],['id-asc','ID昇順'],['hv-desc','硬度高'],['hv-asc','硬度低'],['dt-desc','日付新'],['nm-asc','名称']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </Select>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-[13px]" style={{ tableLayout:'fixed' }}>
            <colgroup>
              <col style={{width:'36px'}}/><col style={{width:'90px'}}/><col /><col style={{width:'96px'}}/>
              <col style={{width:'76px'}}/><col style={{width:'130px'}}/><col style={{width:'88px'}}/>
              <col style={{width:'82px'}}/><col style={{width:'48px'}}/><col style={{width:'76px'}}/>
            </colgroup>
            <thead>
              <tr className="bg-raised">
                <th className="p-2.5 text-left border-b border-[var(--border-faint)]">
                  <Checkbox checked={slice.length>0&&slice.every(r=>selected.has(r.id))} onChange={e=>toggleAll(e.target.checked)} aria-label="全選択" />
                </th>
                {[['ID','font-mono'],['材料名称',''],['カテゴリ',''],['硬度 HV',''],['組成',''],['登録日',''],['ステータス',''],['AI','text-center'],['操作','text-center']].map(([l,cls])=>(
                  <th key={l} className={`px-3.5 py-2.5 text-left text-[11px] font-bold text-text-lo tracking-[.05em] uppercase border-b border-[var(--border-faint)] ${cls}`}>{l}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {slice.length === 0 ? (
                <tr><td colSpan={10} className="text-center py-10 text-text-lo"><Icon name="info" size={24} className="mx-auto mb-2 opacity-30" /><div>該当データなし</div></td></tr>
              ) : slice.map(r => (
                <tr key={r.id}
                  className={`border-b border-[var(--border-faint)] last:border-b-0 cursor-pointer transition-colors duration-75 ${selected.has(r.id) ? 'bg-accent-dim' : 'hover:bg-hover'}`}
                  onClick={e => { if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT') return; onDetail(r.id); }}
                >
                  <td className="p-2.5" onClick={e=>e.stopPropagation()}>
                    <Checkbox checked={selected.has(r.id)} onChange={()=>toggleSelect(r.id)} />
                  </td>
                  <td className="px-3.5 py-2.5"><span className="font-mono text-[12px] text-text-lo">{r.id}</span></td>
                  <td className="px-3.5 py-2.5"><span className="font-semibold">{r.name}</span></td>
                  <td className="px-3.5 py-2.5"><Badge variant="gray">{r.cat}</Badge></td>
                  <td className="px-3.5 py-2.5 font-mono">{r.hv.toLocaleString()}</td>
                  <td className="px-3.5 py-2.5"><span className="font-mono text-[12px] block truncate text-text-md">{r.comp}</span></td>
                  <td className="px-3.5 py-2.5 text-[12px] text-text-lo">{r.date}</td>
                  <td className="px-3.5 py-2.5"><Badge>{r.status}</Badge></td>
                  <td className="px-3.5 py-2.5 text-center">{r.ai && <Badge variant="ai">検出</Badge>}</td>
                  <td className="px-3.5 py-2.5">
                    <div className="flex gap-1 justify-center" onClick={e=>e.stopPropagation()}>
                      <Tooltip label="詳細を見る" placement="top"><Button variant="default" size="xs" onClick={() => onDetail(r.id)} aria-label="詳細"><Icon name="info" size={11} /></Button></Tooltip>
                      <Tooltip label="編集する" placement="top"><Button variant="default" size="xs" onClick={() => onNav('edit_'+r.id)} aria-label="編集"><Icon name="edit" size={11} /></Button></Tooltip>
                      <Tooltip label="削除する" placement="top"><Button variant="danger" size="xs" onClick={() => setDeleteTarget(r.id)} aria-label="削除"><Icon name="trash" size={11} /></Button></Tooltip>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {/* Pagination */}
        <div className="flex items-center justify-between px-4 py-2.5 bg-raised border-t border-[var(--border-faint)]">
          <span className="text-[12px] text-text-lo">{(page-1)*pageSize+1}–{Math.min(page*pageSize,filtered.length)} / {filtered.length}件</span>
          <div className="flex items-center gap-1">
            <Button variant="default" size="xs" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page<=1}><Icon name="chevronLeft" size={10} /></Button>
            {Array.from({length:Math.min(totalPages,5)},(_,i)=>{
              let p = i+1;
              if(totalPages>5){
                if(page<=3) p=i+1;
                else if(page>=totalPages-2) p=totalPages-4+i;
                else p=page-2+i;
              }
              return <Button key={p} variant={p===page?'primary':'default'} size="xs" onClick={()=>setPage(p)}>{p}</Button>;
            })}
            <Button variant="default" size="xs" onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page>=totalPages}><Icon name="chevronRight" size={10} /></Button>
            <Select value={pageSize} onChange={e=>{setPageSize(parseInt(e.target.value));setPage(1);}} className="text-[12px] py-1 ml-2">
              {[10,25,50].map(n=><option key={n} value={n}>{n}件</option>)}
            </Select>
          </div>
        </div>
      </Card>
    </div>
  );
};

  const { addToast } = useContext(AppCtx);

  const newId = `MAT-0${nextId}`;

  const set = (k) => (v) => setForm(f => ({...f, [k]: v}));
  const setV = (k) => (e) => set(k)(e.target.value);

  const onCompChange = (v) => {
    set('comp')(v);
    if (compTimer) clearTimeout(compTimer);
    if (v.length < 3) return;
    const t = setTimeout(async () => {
      setAiLoading(true);
      const res = await claude.call(`材料組成「${v}」の典型的な硬度・引張強さ・弾性率を3行（各「硬度: 180〜220 HV」形式）で教えてください。`);
      setAiBody(res); setAiLoading(false);
    }, 700);
    setCompTimer(t);
  };

  const aiAutofill = async () => {
    const c = form.comp || form.cat || '金属合金';
    setAiLoading(true);
    const res = await claude.call(`材料「${c}」の典型的な物性値をJSONのみで返してください（単位なし数値）: {"hv":数値,"ts":数値,"el":数値,"dn":数値}`);
    try {
      const j = JSON.parse(res.replace(/```json?|```/g,'').trim());
      setForm(f => ({...f, hv:j.hv||f.hv, ts:j.ts||f.ts, el:j.el||f.el, dn:j.dn||f.dn}));
      setAiBody('物性値を補完しました。実測値で確認してください。');
      addToast('AI 補完完了');
    } catch(e) { setAiBody(res); }
    setAiLoading(false);
  };

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = '必須項目です';
    if (!form.cat) e.cat = '必須項目です';
    if (!form.comp.trim()) e.comp = '必須項目です';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = async () => {
    if (!validate()) { addToast('必須項目を入力してください', 'warn'); return; }
    const record = {
      id: editing ? editId : newId,
      name: form.name, cat: form.cat, comp: form.comp,
      hv: parseFloat(form.hv)||0, ts: parseFloat(form.ts)||0, el: parseFloat(form.el)||0,
      pf: parseFloat(form.pf)||null, el2: parseFloat(form.el2)||0, dn: parseFloat(form.dn)||0,
      batch: form.batch || 'B-未分類',
      date: new Date().toISOString().slice(0,10),
      author: '木村 研一', status: editing?.status || '登録済', ai: editing?.ai || false,
      memo: form.memo,
    };
    if (editing) {
      dispatch({ type: 'UPDATE', record });
      addToast(`${editId} を更新しました`);
    } else {
      dispatch({ type: 'ADD', record });
      nextId++;
      embedding.addToIndex(record);
      addToast(`${newId} を登録しました`);
    }
    onSuccess();
  };

  const anomalyHv = parseFloat(form.hv) > 3500;
  const anomalyTs = parseFloat(form.ts) > 3000;

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-start gap-3">
        <div className="flex-1">
          <h1 className="ptitle text-[19px] font-bold tracking-tight">{editing ? `データ編集 — ${editId}` : '材料データ 新規登録'}</h1>
          <p className="text-[12px] text-text-lo mt-0.5">AI が入力をリアルタイムサポートします</p>
        </div>
      </div>

      <div className="grid gap-4" style={{ gridTemplateColumns: '1fr 320px', alignItems: 'start' }}>
        <div className="flex flex-col gap-4">
          {/* 基本情報 */}
          <Card className="p-4">
            <div className="text-[12px] font-bold text-text-lo tracking-[.04em] uppercase mb-4 pb-2.5 border-b border-[var(--border-faint)]">基本情報</div>
            <div className="grid grid-cols-2 gap-3">
              <FormGroup label="材料名称" required error={errors.name}>
                <Input value={form.name} onChange={setV('name')} placeholder="例: SUS304-L 改良型" error={!!errors.name} />
              </FormGroup>
              <FormGroup label="カテゴリ" required error={errors.cat}>
                <Select value={form.cat} onChange={setV('cat')} className={`w-full ${errors.cat ? 'border-err' : ''}`}>
                  <option value="">選択してください</option>
                  {['金属合金','セラミクス','ポリマー','複合材料'].map(c=><option key={c}>{c}</option>)}
                </Select>
              </FormGroup>
              <FormGroup label="サンプルID" hint="自動採番">
                <Input value={editing ? editId : newId} readOnly className="bg-sunken text-text-lo cursor-default" />
              </FormGroup>
              <FormGroup label="バッチ番号">
                <Input value={form.batch} onChange={setV('batch')} placeholder="例: B-038" />
              </FormGroup>
              <FormGroup label="登録者">
                <Input value="木村 研一" readOnly className="bg-sunken text-text-lo cursor-default" />
              </FormGroup>
              <FormGroup label="試験温度">
                <UnitInput unit="℃" inputProps={{ value: form.temp, onChange: setV('temp'), placeholder: '25' }} />
              </FormGroup>
              <FormGroup label="組成・配合" required error={errors.comp} className="col-span-2">
                <Input value={form.comp} onChange={e => onCompChange(e.target.value)} placeholder="例: Fe-18Cr-8Ni-0.03C (wt%)" error={!!errors.comp} />
              </FormGroup>
            </div>
          </Card>

          {/* 物性データ */}
          <Card className="p-4">
            <div className="flex items-center mb-4 pb-2.5 border-b border-[var(--border-faint)]">
              <span className="text-[12px] font-bold text-text-lo tracking-[.04em] uppercase">物性データ</span>
              {(anomalyHv || anomalyTs) && (
                <span className="ml-auto flex items-center gap-1 px-2 py-0.5 rounded-full text-[12px] bg-err-dim text-err">
                  <Icon name="warning" size={12} />AI: 異常値候補
                </span>
              )}
            </div>
            <div className="grid grid-cols-3 gap-3">
              <FormGroup label="硬度" hint={anomalyHv ? '通常範囲外の値です' : undefined}>
                <UnitInput unit="HV" inputProps={{ value: form.hv, onChange: setV('hv'), placeholder: '200', type: 'number' }} />
              </FormGroup>
              <FormGroup label="引張強さ" hint={anomalyTs ? '標準範囲を超えています' : undefined}>
                <UnitInput unit="MPa" inputProps={{ value: form.ts, onChange: setV('ts'), placeholder: '520', type: 'number' }} />
              </FormGroup>
              <FormGroup label="弾性率">
                <UnitInput unit="GPa" inputProps={{ value: form.el, onChange: setV('el'), placeholder: '190', type: 'number' }} />
              </FormGroup>
              <FormGroup label="耐力 0.2%">
                <UnitInput unit="MPa" inputProps={{ value: form.pf, onChange: setV('pf'), placeholder: '170', type: 'number' }} />
              </FormGroup>
              <FormGroup label="伸び">
                <UnitInput unit="%" inputProps={{ value: form.el2, onChange: setV('el2'), placeholder: '40', type: 'number' }} />
              </FormGroup>
              <FormGroup label="密度">
                <UnitInput unit="g/cm³" inputProps={{ value: form.dn, onChange: setV('dn'), placeholder: '7.9', type: 'number', step: '0.1' }} />
              </FormGroup>
              <FormGroup label="備考" className="col-span-3">
                <Textarea value={form.memo} onChange={setV('memo')} placeholder="試験条件、観察事項など..." rows={2} />
              </FormGroup>
            </div>
            <div className="flex justify-end gap-2 pt-3 mt-1 border-t border-[var(--border-faint)]">
              <Button variant="default" onClick={onCancel}>キャンセル</Button>
              <Button variant="default" onClick={() => addToast('下書き保存しました')}>下書き</Button>
              <Button variant="primary" onClick={submit}>{editing ? '更新する' : '登録する'}</Button>
            </div>
          </Card>
        </div>

        {/* AI Sidebar */}
        <div className="flex flex-col gap-3 sticky top-0">
          <AIInsightCard loading={aiLoading} chips={[
            { label: '物性値を補完', onClick: aiAutofill },
            { label: '組成テンプレ', onClick: async () => {
              setAiLoading(true);
              const res = await claude.call(`${form.cat||'金属合金'}の代表的な組成式を3種類、材料名付きで各1行で教えてください。`);
              setAiBody(res); setAiLoading(false);
            }},
          ]}>
            {!aiLoading && <p>{aiBody}</p>}
          </AIInsightCard>

          <Card className="p-4">
            <div className="text-[12px] font-bold text-text-lo tracking-[.04em] uppercase mb-3">登録フロー</div>
            {[['基本情報・組成を入力','accent',true],['AI が物性値の妥当性を検証','bg-raised text-text-lo',false],['Embedding 生成・索引更新','bg-raised text-text-lo',false],['担当者レビュー → 承認','bg-raised text-text-lo',false]].map(([label,style,active],i) => (
              <div key={i} className="flex items-center gap-2.5 py-1.5 text-[12px]">
                <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 ${active ? 'bg-accent text-white' : 'bg-raised text-text-lo border border-[var(--border-default)]'}`}>{i+1}</div>
                <span className={active ? 'text-text-hi font-semibold' : 'text-text-md'}>{label}</span>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
};

/** VectorSearchPage */
const VectorSearchPage = ({ db, embedding, claude }) => {
  const [query, setQuery] = useState('');
  const [topK, setTopK] = useState(5);
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [searched, setSearched] = useState(false);

  const PRESETS = ['高温強度が高い耐熱合金','軽量で高比強度の材料','耐食性に優れるステンレス系','生体適合性がある金属','低摩擦・化学的に安定なポリマー'];

  const runSearch = async (q = query) => {
    if (!q.trim()) return;
    setSearching(true);
    const res = await embedding.search(q, topK);
    setResults(res); setSearched(true); setSearching(false);
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-start gap-3">
        <div className="flex-1">
          <h1 className="ptitle text-[19px] font-bold tracking-tight flex items-center gap-2">
            ベクトル検索 <Badge variant="vec">VSS</Badge>
          </h1>
          <p className="text-[12px] text-text-lo mt-0.5">自然言語の説明で意味的に近い材料を検索します</p>
        </div>
      </div>

      <VecCard>
        各材料テキスト（名称・組成・特性）を <strong className="text-text-hi">TF.js Universal Sentence Encoder</strong> で 512次元ベクトルに変換。
        クエリとの <strong className="text-text-hi">コサイン類似度</strong> を計算してランキング表示します。
        キーワード検索では拾えない「意味的に近い材料」を発見できます。
        <div className="mt-2 text-[12px]">
          <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full ${embedding.status==='ready' ? 'bg-[var(--ok-dim)] text-ok' : 'bg-raised text-text-lo'}`}>
            <Icon name="embed" size={11} />
            {embedding.status==='ready' ? `${embedding.embCount}件 インデックス済み` : embedding.status==='indexing' ? '索引構築中...' : '初期化中...'}
          </span>
        </div>
      </VecCard>

      <Card className="p-3">
        <div className="flex gap-2 items-center">
          <div className="relative flex-1">
            <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-vec pointer-events-none"><Icon name="vecSearch" size={15} /></span>
            <Input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&runSearch()}
              placeholder='例: "高温でも強度が落ちない軽量合金" / "耐食性が高いステンレス系"'
              className="pl-9 text-[14px]" />
          </div>
          <Select value={topK} onChange={e=>setTopK(parseInt(e.target.value))}>
            <option value={3}>Top 3</option><option value={5}>Top 5</option><option value={10}>Top 10</option>
          </Select>
          <Button variant="vec" onClick={() => runSearch()} disabled={searching || !query.trim()}>
            <Icon name="vecSearch" size={13} />{searching ? '検索中...' : '検索'}
          </Button>
        </div>
        <div className="flex gap-2 mt-2.5 flex-wrap">
          {PRESETS.map(p => (
            <button key={p} onClick={() => { setQuery(p); runSearch(p); }}
              className="inline-flex items-center gap-1 px-3 py-1 rounded-full text-[12px] bg-surface text-vec border border-[var(--border-default)] hover:bg-vec-dim transition-all font-ui">
              {p}
            </button>
          ))}
        </div>
      </Card>

      {searching && <div className="text-center py-8 text-text-lo"><Typing color="var(--vec)" /><p className="mt-2 text-[13px]">ベクトル計算中...</p></div>}

      {searched && !searching && (
        <div className="flex flex-col gap-2">
          {/* Score viz */}
          {results.length > 0 && (
            <Card className="p-3">
              <div className="text-[12px] font-bold text-text-lo tracking-[.05em] uppercase mb-2">類似度スコア分布</div>
              <div className="flex items-end gap-1.5 h-10">
                {results.map((r, i) => (
                  <div key={r.id} className="flex-1 flex flex-col items-center gap-1">
                    <span className="text-[10px] text-text-lo">{Math.round((r.score||0)*100)}%</span>
                    <div className="w-full rounded-t-sm" style={{ height: `${Math.round((r.score||0)*100)*.28}px`, background: 'var(--vec-mid)', opacity: .4 + (results.length-i)/results.length*.6 }} />
                  </div>
                ))}
              </div>
              <div className="flex gap-1.5 mt-1">
                {results.map(r => <div key={r.id} className="flex-1 text-[10px] text-text-lo text-center truncate">{r.id.slice(-4)}</div>)}
              </div>
              <p className="text-[11px] text-text-lo mt-1.5">クエリ: "{query}"</p>
            </Card>
          )}

          {results.map((r, i) => (
            <Card key={r.id} className="p-3 hover:border-[var(--vec-mid)] transition-colors cursor-pointer">
              <div className="flex items-center gap-2.5 mb-1.5">
                <span className="text-[13px] font-bold text-text-lo">#{i+1}</span>
                <span className="font-mono text-[12px] text-text-lo">{r.id}</span>
                <span className="font-semibold flex-1">{r.name}</span>
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[12px] font-bold bg-vec-dim text-vec border border-[var(--border-default)]">
                  <Icon name="embed" size={11} />{Math.round((r.score||0)*100)}%
                </span>
                <Badge>{r.status}</Badge>
              </div>
              <p className="text-[12px] text-text-md">{r.cat} · 硬度: {r.hv} HV · <span className="font-mono">{r.comp}</span></p>
              {r.memo && <p className="text-[11px] text-text-lo mt-1">{r.memo}</p>}
              <div className="h-0.5 rounded-full mt-2 opacity-50" style={{ width:`${Math.round((r.score||0)*100)}%`, background:'var(--vec-mid)' }} />
            </Card>
          ))}

          {results.length === 0 && <div className="text-center py-8 text-text-lo"><Icon name="search" size={28} className="mx-auto mb-2 opacity-30" /><p>該当なし</p></div>}
        </div>
      )}
    </div>
  );
};

/** RAGChatPage */
const RAGChatPage = ({ db, embedding, claude, voice }) => {
  const [messages, setMessages] = useState([
    { role: 'ai', text: 'Matlens の材料データベースについてなんでも聞いてください。ベクトル検索で関連データを取得し、根拠のある回答を提供します。' }
  ]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const [ctxSources, setCtxSources] = useState([]);
  const msgsRef = useRef(null);

  const PRESETS = ['硬度が300HV以上の金属合金を教えて','SUS316L に近い物性の材料は何がある？','航空宇宙用途に適した軽量材料を提案して','レビュー待ちデータの懸念点を分析して','耐食性と強度を両立する材料を教えて'];

  const send = async (q = input.trim()) => {
    if (!q || sending) return;
    setInput('');
    setSending(true);
    setMessages(prev => [...prev, { role: 'user', text: q }]);

    const topDocs = await embedding.search(q, 4);
    setCtxSources(topDocs);
    const ctxText = topDocs.map(r => `[${r.id}] ${r.name}（${r.cat}）: 組成=${r.comp}, 硬度=${r.hv}HV, 引張=${r.ts}MPa${r.memo?', 備考='+r.memo:''}`).join('\n');
    const sys = `あなたは材料科学の専門家AIアシスタントです。材料DB「Matlens」に組み込まれています。
以下の関連材料データ（RAG取得）を根拠として、Markdown形式で正確・実用的な日本語で回答してください。根拠となった材料IDを明記してください。

【関連材料データ】
${ctxText}`;

    const reply = await claude.call(q, sys);
    setMessages(prev => [...prev, { role: 'ai', text: reply, sources: topDocs }]);
    setSending(false);
    // デモモードや短すぎる応答は読み上げない
    const speakText = reply
      .replace(/\*\*/g,'').replace(/#+\s/g,'').replace(/`/g,'')
      .replace(/<[^>]*>/g,'').replace(/\n+/g,' ').replace(/\s+/g,' ').trim();
    if (voice && speakText.length > 20 && !speakText.includes('デモモード') && !speakText.includes('APIキー')) {
      voice.speak(speakText.slice(0, 400));
    }
    // AIメッセージ追加後にスクロール
    requestAnimationFrame(() => {
      setTimeout(() => {
        if (msgsRef.current) {
          msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
        }
      }, 50);
    });
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-start gap-3">
        <div className="flex-1">
          <h1 className="ptitle text-[19px] font-bold tracking-tight flex items-center gap-2">
            RAG チャット <Badge variant="ai">RAG</Badge>
          </h1>
          <p className="text-[12px] text-text-lo mt-0.5">材料DBをコンテキストにしたAI質問応答</p>
        </div>
      </div>

      <div className="flex items-center gap-1.5 text-[12px] text-text-lo px-1">
        {['クエリ','Embedding','類似度検索','コンテキスト注入','AI回答'].map((s,i,arr)=>(
          <React.Fragment key={i}>
            <span className={`px-2 py-0.5 rounded-full text-[11px] font-semibold ${i===arr.length-1?'bg-ai-dim text-ai':'bg-vec-dim text-vec'}`}>{s}</span>
            {i<arr.length-1&&<Icon name="chevronRight" size={10} className="text-text-lo flex-shrink-0"/>}
          </React.Fragment>
        ))}
      </div>

      <div className="flex gap-2 flex-wrap items-center">
        {PRESETS.slice(0,3).map(p => (
          <button key={p} onClick={() => send(p)}
            className="inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-[12px] bg-ai-dim text-ai border border-[var(--border-default)] hover:bg-ai hover:text-white transition-all font-ui">
            {p}
          </button>
        ))}
        <button onClick={() => send(PRESETS[3])}
          className="inline-flex items-center gap-1 px-2 py-1 rounded-full text-[12px] bg-raised text-text-lo border border-[var(--border-default)] hover:bg-hover transition-all font-ui">
          <Icon name="chevronDown" size={11}/>他の質問
        </button>
      </div>

      <div className="grid gap-4" style={{ gridTemplateColumns: '1fr 240px', alignItems: 'start' }}>
        <Card className="overflow-hidden flex flex-col" style={{ height: 'calc(100vh - 360px)', minHeight: '380px' }}>
          <div ref={msgsRef} className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
            {messages.map((m, i) => (
              <div key={i} className={`flex gap-2.5 items-start ${m.role==='user' ? 'flex-row-reverse' : ''}`}>
                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold flex-shrink-0 ${m.role==='ai' ? 'bg-ai-dim text-ai' : 'bg-accent-dim text-accent'}`}>
                  {m.role==='ai' ? <Icon name="ai" size={13} /> : 'KK'}
                </div>
                <div className={`max-w-[78%] flex flex-col gap-1.5 ${m.role==='user' ? 'items-end' : ''}`}>
                  <div className={`px-3 py-2 rounded-lg text-[13px] leading-relaxed ${m.role==='ai' ? 'bg-raised border border-[var(--border-faint)]' : 'bg-accent text-white'}`}>
                    {m.role === 'ai' ? <MarkdownBubble text={m.text} onSpeak={voice?.speak} /> : m.text}
                  </div>
                  {m.sources && m.sources.length > 0 && (
                    <div className="px-3 py-2 bg-vec-dim border border-[var(--border-default)] rounded-md text-[12px] w-full">
                      <div className="text-[10px] font-bold text-vec tracking-[.05em] uppercase mb-1 flex items-center gap-1"><Icon name="embed" size={11} />参照した材料データ</div>
                      {m.sources.map(s => <div key={s.id} className="text-text-md font-mono">▸ {s.id}: {s.name}</div>)}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {sending && (
              <div className="flex gap-2.5 items-start">
                <div className="w-7 h-7 rounded-full bg-ai-dim text-ai flex items-center justify-center"><Icon name="ai" size={13} /></div>
                <div className="px-3 py-2.5 bg-raised border border-[var(--border-faint)] rounded-lg"><Typing /></div>
              </div>
            )}
          </div>
          <div className="px-3 py-2.5 border-t border-[var(--border-faint)] flex gap-2 items-end">
            <Tooltip label="音声でメッセージを入力する" placement="top">
            <button className="flex items-center justify-center w-9 h-9 border border-[var(--border-default)] rounded-md bg-raised text-text-md hover:bg-hover transition-colors flex-shrink-0" onClick={() => voice?.toggleListening()} aria-label="音声入力">
              <Icon name="mic" size={15} />
            </button>
            </Tooltip>
            <textarea value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }}
              placeholder="質問を入力... (Enter 送信、Shift+Enter 改行)"
              rows={2} className="flex-1 px-3 py-2 border border-[var(--border-default)] rounded-md bg-raised text-text-hi text-[13px] font-ui resize-none leading-snug max-h-24 outline-none focus:border-[var(--ai-mid)] focus:ring-2 focus:ring-[var(--ai-glow)]" />
            <Button variant="ai" onClick={() => send()} disabled={sending || !input.trim()}>
              送信 <Icon name="chevronRight" size={12} />
            </Button>
          </div>
        </Card>

        <div className="flex flex-col gap-3">
          <Card className="p-3">
            <div className="text-[12px] font-bold text-text-lo uppercase tracking-[.04em] mb-2">よく使われる質問</div>

              <button key={p} onClick={() => send(p)}
                className="w-full text-left px-2.5 py-1.5 rounded-md text-[12px] text-text-md hover:bg-hover hover:text-text-hi transition-colors font-ui mb-0.5">
                {p}
              </button>
            ))}
          </Card>
          <VecCard>
            <div className="text-[12px] font-bold text-vec uppercase tracking-[.04em] mb-2">最後のRAG取得</div>
            {ctxSources.length === 0 ? <p>—</p> : ctxSources.map(s=>(
              <div key={s.id} className="text-[12px] text-text-md font-mono py-0.5 border-b border-[var(--border-faint)] last:border-b-0">
                ▸ {s.id}: {s.name}
              </div>
            ))}
          </VecCard>
        </div>
      </div>
    </div>
  );
};

/** SimilarPage */
const SimilarPage = ({ db, embedding, claude }) => {
  const [base, setBase] = useState('MAT-0237 — SUS316L 低炭素ステンレス');
  const [weight, setWeight] = useState('総合スコア');
  const [k, setK] = useState(10);
  const [threshold, setThreshold] = useState(60);
  const [results, setResults] = useState([]);
  const [aiComment, setAiComment] = useState('');
  const [running, setRunning] = useState(false);
  const [ran, setRan] = useState(false);

  const run = async () => {
    setRunning(true);
    const baseId = (base.match(/MAT-\d+/)||[])[0];
    const baseRec = db.find(r=>r.id===baseId);
    const q = baseRec ? `${baseRec.name} ${baseRec.comp}` : base;
    const res = await embedding.search(q, k);
    const filtered = res.filter(r => r.id !== baseId && (r.score||0) >= threshold/100);
    setResults(filtered);
    setRan(true);
    const t = await claude.call(`「${base}」に類似する材料として ${filtered.slice(0,3).map(r=>r.name).join('、')} が候補です。2〜3文で選定ポイントと用途別の使い分けをアドバイスしてください。`);
    setAiComment(t);
    setRunning(false);
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-start gap-3">
        <div className="flex-1">
          <h1 className="ptitle text-[19px] font-bold tracking-tight">類似材料探索</h1>
          <p className="text-[12px] text-text-lo mt-0.5">Embedding コサイン類似度で類似材料を発見します</p>
        </div>
      </div>
      <Card className="p-4">
        <div className="grid grid-cols-2 gap-3 mb-3">
          <FormGroup label="基準材料（ID または名称）">
            <Input value={base} onChange={e=>setBase(e.target.value)} placeholder="例: MAT-0231 または SUS316L" />
          </FormGroup>
          <FormGroup label="重み付け">
            <Select value={weight} onChange={e=>setWeight(e.target.value)} className="w-full">
              {['総合スコア（推奨）','組成を優先','硬度を優先'].map(o=><option key={o}>{o}</option>)}
            </Select>
          </FormGroup>
          <FormGroup label="最大表示件数">
            <Select value={k} onChange={e=>setK(parseInt(e.target.value))} className="w-full">
              <option value={5}>5件</option><option value={10}>10件</option><option value={20}>20件</option>
            </Select>
          </FormGroup>
          <FormGroup label="類似度しきい値">
            <UnitInput unit="% 以上" inputProps={{ value: threshold, onChange: e=>setThreshold(parseInt(e.target.value)||0), type:'number',min:0,max:100 }} />
          </FormGroup>
        </div>
        <div className="flex gap-2">
          <Button variant="vec" onClick={run} disabled={running}><Icon name="vecSearch" size={13} />{running?'探索中...':'探索実行'}</Button>
          <Button variant="default" size="sm" onClick={() => { setResults([]); setRan(false); setAiComment(''); }}>クリア</Button>
        </div>
      </Card>

      {ran && (
        <div className="flex flex-col gap-3">
          {aiComment && (
            <AIInsightCard chips={[]}>
              <div className="md-preview" dangerouslySetInnerHTML={{ __html: typeof marked!=='undefined'?marked.parse(aiComment):aiComment }} />
            </AIInsightCard>
          )}
          {!aiComment && <div className="text-center py-4 text-text-lo"><Typing color="var(--ai-col)" /></div>}
          {results.map((r,i) => (
            <Card key={r.id} className="p-3 hover:border-[var(--vec-mid)] transition-colors">
              <div className="flex items-center gap-2.5 mb-1.5">
                <span className="text-[13px] font-bold text-text-lo">#{i+1}</span>
                <span className="font-mono text-[12px] text-text-lo">{r.id}</span>
                <span className="font-semibold flex-1">{r.name}</span>
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[12px] font-bold bg-vec-dim text-vec border border-[var(--border-default)]">
                  <Icon name="embed" size={11} />{Math.round((r.score||0)*100)}%
                </span>
              </div>
              <p className="text-[12px] text-text-md">{r.cat} · 硬度: {r.hv} HV · {r.comp}</p>
              <div className="h-0.5 rounded-full mt-2 opacity-50" style={{ width:`${Math.round((r.score||0)*100)}%`, background:'var(--vec-mid)' }} />
            </Card>
          ))}
        </div>
      )}
    </div>
  );
};

const ApiDebugPage = ({ db, dispatch }) => {
  const [logs, setLogs] = useState(() => getApiLogs());
  const [selected, setSelected] = useState(null);
  const [tab, setTab] = useState('logs');
  const [config, setConfig] = useState({ ...MOCK_CONFIG });
  const [customMethod, setCustomMethod] = useState('GET');
  const [customPath, setCustomPath] = useState('/api/materials');
  const [customBody, setCustomBody] = useState('');
  const [customResult, setCustomResult] = useState(null);
  const [sending, setSending] = useState(false);

  useEffect(() => { const unsub = onApiLog(() => setLogs([...getApiLogs()])); return unsub; }, []);

  const runRequest = async () => {
    setSending(true);
    try {
      const opts = { method: customMethod, headers: { 'Content-Type': 'application/json' } };
      if (customBody && ['POST','PUT','PATCH'].includes(customMethod)) opts.body = customBody;
      const res = await fetch(customPath, opts);
      const text = await res.text();
      let body; try { body = JSON.parse(text); } catch(e) { body = text; }
      setCustomResult({ status: res.status, body, headers: Object.fromEntries([...res.headers.entries()]) });
    } catch (e) { setCustomResult({ error: e.message }); }
    setSending(false);
  };

  const generateCurl = (log) => {
    let cmd = `curl -X ${log.method} 'http://localhost:8000${log.path}'`;
    cmd += `\n  -H 'Content-Type: application/json'`;
    if (log.reqBody) cmd += `\n  -d '${JSON.stringify(log.reqBody)}'`;
    return cmd;
  };

const TestSuitePage = () => {
  const [results, setResults] = useState({});
  const [running, setRunning] = useState(false);
  const [filter, setFilter] = useState('all');
  const GROUPS = [...new Set(TEST_CASES.map(t=>t.group))];
  const G_COLORS = {CRUD:'blue',Filter:'vec',Validation:'amber',RateLimit:'ai',API:'green',DataIntegrity:'gray'};

  const runCases = async (cases) => {
    setRunning(true);
    for(const tc of cases){
      try{const r=await tc.fn();setResults(p=>({...p,[tc.id]:{...r,status:r.passed?'pass':'fail'}}));}
      catch(e){setResults(p=>({...p,[tc.id]:{passed:false,status:'error',message:e.message}}));}
    }
    setRunning(false);
  };

  const total=TEST_CASES.length,passed=Object.values(results).filter(r=>r.status==='pass').length,failed=Object.values(results).filter(r=>r.status!=='pass'&&r.status).length,ran=passed+failed;
  const rate=ran>0?Math.round(passed/ran*100):0;
  const filtered=filter==='all'?TEST_CASES:filter==='pass'?TEST_CASES.filter(t=>results[t.id]?.status==='pass'):filter==='fail'?TEST_CASES.filter(t=>results[t.id]?.status&&results[t.id]?.status!=='pass'):TEST_CASES.filter(t=>t.group===filter);

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-start gap-3">
        <div className="flex-1">
          <h1 className="ptitle text-[19px] font-bold tracking-tight flex items-center gap-2">テストスイート <Badge variant="green">Unit</Badge></h1>
          <p className="text-[12px] text-text-lo mt-0.5">CRUD / Filter / Validation / RateLimit / API / DataIntegrity — 30テストケース</p>
        </div>
        <div className="flex gap-2 items-center">
          {ran>0&&<div className={`text-[13px] font-bold font-mono ${passed===ran?'text-ok':'text-err'}`}>{passed}/{ran} ({rate}%)</div>}
          <Button variant="primary" onClick={()=>runCases(TEST_CASES)} disabled={running}><Icon name="refresh" size={13}/>{running?'実行中...':'全実行'}</Button>
        </div>
      </div>
      {ran>0&&<div className="grid grid-cols-4 gap-3"><KpiCard label="総数" value={total}/><KpiCard label="実行" value={ran}/><KpiCard label="通過" value={passed} color="var(--ok)"/><KpiCard label="失敗" value={failed} color={failed>0?'var(--err)':'var(--ok)'}/></div>}
      {ran>0&&<ProgressBar value={rate} color={rate===100?'var(--ok)':'var(--warn)'}/>}
      <div className="flex gap-2 flex-wrap items-center">
        {['all',...GROUPS,'pass','fail'].map(f=><Button key={f} variant={filter===f?'primary':'default'} size="sm" onClick={()=>setFilter(f)}>{f==='pass'?<><Icon name="check" size={11} className="text-ok"/>通過</>:f==='fail'?<><Icon name="warning" size={11} className="text-err"/>失敗</>:f}</Button>)}
        <div className="ml-auto flex gap-1">
          {GROUPS.map(g=><Button key={g} variant="outline" size="xs" onClick={()=>runCases(TEST_CASES.filter(t=>t.group===g))} disabled={running}>{g}</Button>)}
        </div>
      </div>
      <Card className="overflow-hidden">
        <table className="w-full text-[12px]">
          <thead className="bg-raised border-b border-[var(--border-faint)]">
            <tr>{['#','グループ','テスト名','状態','actual','expected'].map(h=><th key={h} className="px-3 py-2 text-left text-[11px] font-bold text-text-lo uppercase tracking-[.04em]">{h}</th>)}</tr>
          </thead>
          <tbody>
            {filtered.map(tc=>{
              const r=results[tc.id];
              return(
                <tr key={tc.id} className={`border-b border-[var(--border-faint)] last:border-b-0 ${!r?'':r.status==='pass'?'bg-[var(--ok-dim)]':'bg-err-dim'}`}>
                  <td className="px-3 py-2 font-mono text-text-lo">{tc.id}</td>
                  <td className="px-3 py-2"><Badge variant={G_COLORS[tc.group]||'gray'}>{tc.group}</Badge></td>
                  <td className="px-3 py-2 font-medium">{tc.name}</td>
                  <td className="px-3 py-2">{!r?<span className="text-text-lo">—</span>:r.status==='pass'?<span className="flex items-center gap-1 text-ok font-bold"><Icon name="check" size={12}/>PASS</span>:r.status==='error'?<span className="flex items-center gap-1 text-err font-bold"><Icon name="warning" size={12}/>ERROR</span>:<span className="flex items-center gap-1 text-err font-bold"><Icon name="close" size={12}/>FAIL</span>}</td>
                  <td className="px-3 py-2 font-mono text-[11px] text-text-lo max-w-[100px] truncate">{r?String(r.actual??'—'):'—'}</td>
                  <td className="px-3 py-2 font-mono text-[11px] text-text-lo max-w-[100px] truncate">{r?String(r.expected??'—'):'—'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};
